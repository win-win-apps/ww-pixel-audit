# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "483bc0c6fa57e9b779a09a4d12f132c1"
name = "WW Pixel Audit"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true
handle = "ww-pixel-audit"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "win-win-ccae-dev.myshopify.com"

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# Scope rationale:
# - read_themes: scan Online Store theme files for hardcoded gtag/fbq/_klOnsite
# - read_script_tags, write_script_tags: read current state, future Module 2 install
# - read_checkouts: detect legacy Additional Scripts content
# - read_orders: revenue baseline for "estimated revenue at risk"
# - read_analytics: future Module 3 Validator polls daily attribution
scopes = "read_themes,read_script_tags,write_script_tags,read_checkouts,read_orders,read_analytics"

[auth]
redirect_urls = [
  "https://shopify.dev/apps/default-app-home/api/auth",
  "https://shopify.dev/apps/default-app-home/auth/callback",
  "https://shopify.dev/apps/default-app-home/auth/shopify/callback"
]

[pos]
embedded = false
